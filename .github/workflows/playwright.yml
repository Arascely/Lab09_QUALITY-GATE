name: CI — Tests E2E Playwright

on:
  pull_request:
    branches: [ main ]

jobs:
  test-e2e:
    name: Ejecutar suite Playwright
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Descargar el código
      - name: Descargar código
        uses: actions/checkout@v4

      # Paso 2: Instalar Node.js 24 
      - name: Instalar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Paso 3: Instalar dependencias del proyecto
      - name: Instalar dependencias
        run: npm install

      # Paso 4: Instalar navegadores de Playwright 
      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      # Paso 5: Ejecutar los tests E2E
      - name: Ejecutar tests E2E
        run: npx playwright test

      # Paso 6: Subir reporte como artefacto si falla o pasa
      - name: Subir reporte Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          
# Le dice a SonarQube Cloud cómo analizar tu proyecto
sonar.projectKey=Arascely_Lab09_QUALITY-GATE
sonar.organization=arascely

# Nombre del proyecto que aparece en el dashboard
sonar.projectName=Lab09 Quality Gate

# Qué archivos analizar
sonar.sources=src
sonar.tests=test

# Excluir node_modules, coverage, y los tests E2E (Playwright, no es código a analizar con este pipeline)
sonar.exclusions=node_modules/**,coverage/**,test/e2e/**

# Indicar dónde está el reporte de cobertura de Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8